<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PhoneSync - Կոնտակտների տեղափոխում</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        #safe-scroller {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        input { font-size: 16px !important; }

        .btn-press:active { transform: scale(0.97); }
        
        .contact-item {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #safe-scroller::-webkit-scrollbar { width: 0; display: none; }
    </style>
</head>
<body class="text-slate-900">

    <div id="safe-scroller">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shrink-0">
            <div class="max-w-md mx-auto px-5 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 w-9 h-9 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                        <i class="fas fa-address-book text-sm"></i>
                    </div>
                    <span class="font-black text-slate-800 tracking-tighter text-xl">PhoneSync</span>
                </div>
                <div class="text-[9px] font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-500 uppercase tracking-widest">
                    Լոկալ Ռեժիմ
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto w-full px-5 py-6 flex-grow">
            <!-- Info Card -->
            <div class="bg-indigo-600 rounded-[2.5rem] p-7 text-white mb-8 shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-2xl font-bold mb-2">Կոնտակտների տեղափոխում</h2>
                    <p class="text-indigo-100 text-xs mb-6">Խմբագրեք և փոխակերպեք կոնտակտները հեշտությամբ</p>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <label class="bg-white/20 hover:bg-white/30 py-4 rounded-2xl text-[11px] font-bold text-center cursor-pointer transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-file-import"></i> Ներմուծել VCF
                            <input type="file" id="import-vcf" accept=".vcf" class="hidden">
                        </label>
                        <button id="export-vcf" class="bg-white text-indigo-600 py-4 rounded-2xl text-[11px] font-bold shadow-md btn-press transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-download"></i> Արտահանել VCF
                        </button>
                    </div>
                </div>
                <i class="fas fa-bolt absolute -right-6 -bottom-6 text-white/10 text-[10rem] rotate-12"></i>
            </div>

            <!-- Add Form -->
            <section class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-8">
                <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-5">Ավելացնել նոր կոնտակտ</h3>
                <div class="space-y-4">
                    <input type="text" id="inp-name" placeholder="Անվանում" 
                        class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500/10 focus:bg-white transition-all text-sm">
                    <input type="tel" id="inp-phone" placeholder="+374 XX XXX XXX" 
                        class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500/10 focus:bg-white transition-all text-sm">
                    <button id="add-btn" class="w-full bg-slate-900 text-white py-4.5 rounded-2xl font-bold text-sm btn-press shadow-xl flex items-center justify-center gap-2 py-4">
                        <i class="fas fa-user-plus"></i> Ավելացնել Ցանկում
                    </button>
                </div>
            </section>

            <!-- List Section -->
            <div class="flex justify-between items-center mb-5 px-1">
                <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Ընթացիկ Ցանկ</span>
                <span id="badge-count" class="text-[10px] font-black bg-indigo-600 text-white px-3 py-1 rounded-full">0</span>
            </div>

            <div id="contact-list" class="space-y-3 pb-10">
                <!-- Data will be injected here -->
            </div>
        </main>
    </div>

    <script>
        // Տվյալների պահպանման տեղական զանգված
        let contacts = [];

        // Էլեմենտների հղումները
        const nameInput = document.getElementById('inp-name');
        const phoneInput = document.getElementById('inp-phone');
        const listContainer = document.getElementById('contact-list');
        const badgeCount = document.getElementById('badge-count');

        // Ցուցակի արտապատկերում
        function render() {
            badgeCount.innerText = contacts.length;

            if (contacts.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-[2.5rem] border border-dashed border-slate-200">
                        <i class="fas fa-folder-open text-slate-100 text-6xl mb-4"></i>
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Ցանկը դատարկ է</p>
                    </div>`;
                return;
            }

            // Սորտավորում ըստ այբբենական կարգի
            contacts.sort((a, b) => a.name.localeCompare(b.name));

            listContainer.innerHTML = '';
            contacts.forEach((c, index) => {
                const div = document.createElement('div');
                div.className = "contact-item bg-white p-4.5 rounded-3xl flex items-center justify-between shadow-sm border border-slate-50";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-50 text-indigo-600 h-11 w-11 rounded-2xl flex items-center justify-center font-black">
                            ${(c.name || "?")[0].toUpperCase()}
                        </div>
                        <div>
                            <div class="font-bold text-sm text-slate-800">${c.name}</div>
                            <div class="text-[10px] text-slate-400 font-bold tracking-wider">${c.phone}</div>
                        </div>
                    </div>
                    <button class="delete-trigger text-slate-200 hover:text-red-500 w-10 h-10 flex items-center justify-center transition-colors" data-index="${index}">
                        <i class="fas fa-times-circle text-sm"></i>
                    </button>
                `;
                div.querySelector('.delete-trigger').onclick = () => deleteContact(index);
                listContainer.appendChild(div);
            });
        }

        // Կոնտակտի ավելացում
        function addContact() {
            const name = nameInput.value.trim();
            const phone = phoneInput.value.trim();

            if (!name || !phone) {
                nameInput.classList.add('border-red-200');
                setTimeout(() => nameInput.classList.remove('border-red-200'), 1000);
                return;
            }

            contacts.push({ name, phone });
            nameInput.value = '';
            phoneInput.value = '';
            nameInput.focus();
            render();
        }

        // Կոնտակտի ջնջում
        function deleteContact(index) {
            contacts.splice(index, 1);
            render();
        }

        // VCF Արտահանում
        function exportVCF() {
            if (contacts.length === 0) return;
            const content = contacts.map(c => `BEGIN:VCARD\nVERSION:3.0\nFN:${c.name}\nTEL:${c.phone}\nEND:VCARD`).join('\n');
            const blob = new Blob([content], {type: 'text/vcard'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'PhoneSync_Contacts.vcf';
            a.click();
            URL.revokeObjectURL(url);
        }

        // VCF Ներմուծում
        function importVCF(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const vCards = evt.target.result.split('BEGIN:VCARD');
                vCards.forEach(card => {
                    if (!card.includes('END:VCARD')) return;
                    const fnMatch = card.match(/FN:(.*)/);
                    const telMatch = card.match(/TEL.*:(.*)/);
                    if (fnMatch && telMatch) {
                        contacts.push({
                            name: fnMatch[1].trim(),
                            phone: telMatch[1].trim().replace(/\r/g, '')
                        });
                    }
                });
                render();
            };
            reader.readAsText(file);
            e.target.value = ''; // Reset input
        }

        // Իրադարձությունների կցում
        document.getElementById('add-btn').onclick = addContact;
        document.getElementById('export-vcf').onclick = exportVCF;
        document.getElementById('import-vcf').onchange = importVCF;

        // Սկզբնական արտապատկերում
        render();
    </script>
</body>
</html>
