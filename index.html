<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <title>Root Project Tree</title>
  <style>
    body { font-family: monospace; background: #f9f9f9; padding: 20px; }
    ul { list-style-type: none; padding-left: 20px; }
    li { margin: 5px 0; }
    button { margin-left: 10px; }
    .tree { background: #fff; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>Project Tree Exporter</h2>
  <div class="tree">
    <ul id="tree">
      <li>Root
        <ul>
          <li>public</li>
          <li>src
            <ul>
              <li>components</li>
              <li>main.js</li>
              <li>style.css</li>
            </ul>
          </li>
          <li>index.html</li>
          <li>README.md</li>
        </ul>
      </li>
    </ul>
  </div>
  <button onclick="exportTxt()">Export to .txt</button>

  <script>
    // Move Up/Down functionality
    document.querySelectorAll('#tree li').forEach(li => {
      let upBtn = document.createElement('button');
      upBtn.textContent = '▲';
      upBtn.onclick = () => {
        let prev = li.previousElementSibling;
        if (prev) li.parentNode.insertBefore(li, prev);
      };
      let downBtn = document.createElement('button');
      downBtn.textContent = '▼';
      downBtn.onclick = () => {
        let next = li.nextElementSibling;
        if (next) li.parentNode.insertBefore(next, li);
      };
      li.appendChild(upBtn);
      li.appendChild(downBtn);
    });

    // Export to .txt
    function exportTxt() {
      function traverse(node, prefix="") {
        let text = "";
        node.childNodes.forEach(child => {
          if (child.tagName === "LI") {
            text += prefix + child.firstChild.textContent.trim() + "\n";
            let ul = child.querySelector("ul");
            if (ul) text += traverse(ul, prefix + "  ");
          }
        });
        return text;
      }
      let treeText = traverse(document.getElementById("tree"));
      let blob = new Blob([treeText], { type: "text/plain" });
      let a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "Root.txt";
      a.click();
    }
  </script>
</body>
</html>
