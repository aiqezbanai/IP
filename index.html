<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACRA Համակարգի Մուտքի Տվյալներ</title>

<style>

body{
margin:0;
padding:30px;
background:#f4f6fb;
font-family:Verdana, Geneva, sans-serif;
}

.card{
max-width:600px;
margin:auto;
background:white;
border-radius:8px;
border:1px solid #e4e7ef;
overflow:hidden;
}

.header{
background:#2F2F3B;
color:#FFFFFE;
padding:18px 20px;
display:flex;
align-items:center;
gap:12px;
font-size:20px;
font-weight:bold;
}

.logo{
height:36px;
}

.content{
padding:25px;
}

.field{
margin-bottom:18px;
}

.label{
font-weight:bold;
margin-bottom:6px;
display:block;
}

.input-wrapper{
position:relative;
width:100%;
}

input{
width:100%;
padding:10px 70px 10px 10px;
border:1px solid #d6dbe6;
border-radius:4px;
font-size:14px;
font-family:Verdana, Geneva, sans-serif;
}

.icon-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
cursor:pointer;
padding:4px;
}

.copy-btn{
right:36px;
}

.eye-btn{
right:6px;
}

.icon{
width:18px;
height:18px;
stroke:#2f6fed;
}

.name-box{
background:#f7f9fc;
padding:10px;
border:1px solid #d6dbe6;
border-radius:4px;
}

.notice{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#2f6fed;
color:white;
padding:10px 18px;
border-radius:6px;
display:none;
font-size:14px;
}

a{
color:#2f6fed;
text-decoration:none;
}

.footer{
background:#f4f6fb;
text-align:center;
padding:16px;
font-size:14px;
color:#555;
border-top:1px solid #e4e7ef;
}

@media screen and (max-width:480px){
body{padding:15px;}
.header{font-size:18px;}
.logo{height:30px;}
}

</style>

<script>

function copyField(id){

let field=document.getElementById(id);
navigator.clipboard.writeText(field.value);

let notice=document.getElementById("copyNotice");
notice.style.display="block";

setTimeout(()=>{
notice.style.display="none";
},2000);

}

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

</script>

</head>

<body>

<div class="card">

<div class="header">

<img src="https://via.placeholder.com/120x40.png" class="logo">

<span>ACRA Համակարգի Մուտքի Տվյալներ</span>

</div>

<div class="content">

<div class="field">
<span class="label">ACRA Հղում</span>
<a href="#/" target="_blank">https://example.com</a>
</div>

<div class="field">
<span class="label">Օգտագործող</span>
<div class="name-box">
Անուն Ազգանուն
</div>
</div>

<div class="field">
<span class="label">Մուտքային անուն</span>

<div class="input-wrapper">

<input id="username" type="text" value="anun.login" readonly>

<button class="icon-btn copy-btn" onclick="copyField('username')">

<svg class="icon" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<rect x="9" y="9" width="13" height="13"></rect>
<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
</svg>

</button>

</div>

</div>

<div class="field">

<span class="label">Գաղտնաբառ</span>

<div class="input-wrapper">

<input id="password" type="password" value="P@ssw0rd123" readonly>

<button class="icon-btn copy-btn" onclick="copyField('password')">

<svg class="icon" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<rect x="9" y="9" width="13" height="13"></rect>
<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
</svg>

</button>

<button class="icon-btn eye-btn" onclick="togglePassword()">

<svg class="icon" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
<circle cx="12" cy="12" r="3"></circle>
</svg>

</button>

</div>

</div>

</div>

<div class="footer">
Brand Name
</div>

</div>

<div id="copyNotice" class="notice">
Պատճենվեց!
</div>

</body>
</html>
